<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"></html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Livros</title>
</head>
<body>
    <h1>Livros Registrados</h1>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>TITULO</th>
                <th>AUTOR</th>
                <th>EDITORA</th>
                <th>ANO de Publicacao</th>
                <th>Genero</th>
                <th>ISBN</th>
                <th>Numero de Paginas</th>
                <th>Sinopse</th>
                <th>Idioma</th>
                <th>Data de Cadastro</th>
                <th>Preco</th>
            </tr>
        </thead>
        <tbody>
            <!-- Itera sobre a lista de Livros -->
            <tr th:each="livro : ${listaLivros}">
                <td th:text="${livro.id_livro}"></td>
                <td th:text="${livro.titulo}"></td>
                <td th:text="${livro.autor}"></td>
                <td th:text="${livro.editora}"></td>
                <td th:text="${livro.anoPublicacao}"></td>
                <td th:text="${livro.genero}"></td>
                <td th:text="${livro.isbn}"></td>
                <td th:text="${livro.numPaginas}"></td>
                <td th:text="${livro.sinopse}"></td>
                <td th:text="${livro.idioma}"></td>
                <td th:text="${livro.dataCadastro}"></td>
                <td th:text="${livro.preco}"></td>

            </tr>
        </tbody>
    </table>
</body>
</html>
